name: Daily Quant Update

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache FinMind Data
        uses: actions/cache@v3
        with:
          path: finmind_cache
          key: ubuntu-latest-finmind-${{ github.run_id }}
          restore-keys: |
            ubuntu-latest-finmind-

      - name: Install Dependencies
        run: |
          pip install pandas numpy lightgbm vectorbt plotly requests tqdm python-dotenv jupyter

      - name: Daily Data Update
        env:
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: |
          python3 data_loaders/01_fetch_finmind_data.py
          python3 data_loaders/03_fix_financial.py
          python3 data_loaders/02_fetch_fundamental_data.py

      - name: Update Portfolio and Send LINE Notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 live_trade.py
          python3 reports/generate_live_dashboard.py

      - name: Commit and Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio.json finmind_cache/ frontend/index.html
          git commit -m "chore auto-update portfolio and data" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
